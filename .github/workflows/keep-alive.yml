name: Keep Render server awake

# Render's free tier spins the server down after ~15 minutes without
# traffic, making the next visitor wait 30-60s for a cold start. Pinging
# the health endpoint every 10 minutes keeps the instance warm.
#
# Note: GitHub pauses scheduled workflows after 60 days with no repo
# activity — a push (or re-enabling it under the Actions tab) resumes it.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          # -m 90 tolerates a cold start if a ping was missed; retries cover
          # transient network blips so the run doesn't show as failed noise.
          curl -sS -m 90 --retry 2 --retry-delay 5 \
            https://vendorhub-server.onrender.com/api/v1/health
