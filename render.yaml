databases:
  - name: vendorhub-db
    databaseName: vendordb
    plan: free
    postgresMajorVersion: "16"

services:
  - type: redis
    name: vendorhub-redis
    plan: free
    ipAllowList: []

  - type: web
    name: vendorhub-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run seed:if-needed
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: vendorhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vendorhub-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Third-party credentials Render can't generate — fill these in on the
      # dashboard after the first deploy (Environment tab). The server won't
      # boot without them: server/src/config/env.ts validates all of these
      # at startup and calls process.exit(1) if any are missing.
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
