databases:
  - name: vendorhub-db
    databaseName: vendordb
    plan: free
    postgresMajorVersion: "16"

services:
  - type: redis
    name: vendorhub-redis
    plan: free
    ipAllowList: []

  - type: web
    name: vendorhub-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run seed:if-needed
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: vendorhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vendorhub-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Public URL of this API — baked into the fileUrl stored for uploaded
      # documents. Without it the server falls back to http://localhost:5000
      # and every uploaded PDF link written to the DB is unreachable from the
      # deployed client.
      - key: PUBLIC_BASE_URL
        value: https://vendorhub-server.onrender.com
      # Deployed client URL — used to build password-reset / accept-invite
      # links in outgoing email.
      - key: CLIENT_URL
        value: https://rit-vendor.vercel.app
      # SMTP credentials Render can't generate — fill these in on the
      # dashboard (Environment tab) to enable outgoing email. They are
      # OPTIONAL: without them the server still boots, but OTP codes,
      # reset/invite links and notification emails are skipped with a
      # warning in the logs, and enabling 2FA is blocked so nobody gets
      # locked out behind an email that can't send.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
